<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=5.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060d1a"/>
<meta name="format-detection" content="telephone=no"/>
<title>Register – AV Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&family=Oswald:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.auth-wrap{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:max(5rem,env(safe-area-inset-top,0px)) max(1rem,16px) max(2rem,env(safe-area-inset-bottom,0px));background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(224,155,26,.07),transparent 60%),var(--navy);position:relative}
.auth-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(224,155,26,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(224,155,26,.025) 1px,transparent 1px);background-size:55px 55px}
.auth-box{width:100%;max-width:500px;position:relative;z-index:2}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-lt),transparent)}
.auth-inner{background:var(--card);border:1px solid var(--border);border-top:none;padding:clamp(1.8rem,5vw,3rem)}
.auth-head{text-align:center;margin-bottom:1.8rem}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:.7rem;margin-bottom:1rem}
.auth-logo img{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);object-fit:cover}
.auth-logo-txt{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--white)}
.auth-logo-txt span{color:var(--gold)}
.auth-h1{font-family:'Oswald',sans-serif;font-size:1.65rem;font-weight:700;color:var(--white);margin-bottom:.2rem}
.auth-sub{font-size:.82rem;font-weight:300;color:var(--muted)}
.auth-form{display:flex;flex-direction:column;gap:.85rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
@media(max-width:460px){.grid2{grid-template-columns:1fr}}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:3rem}
.pw-eye{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.3rem;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.pw-str{height:3px;background:var(--border2);border-radius:2px;margin-top:.3rem;overflow:hidden}
.pw-str-bar{height:100%;width:0;transition:width .3s,background .3s}
.terms-row{display:flex;align-items:flex-start;gap:.7rem}
.terms-row input[type=checkbox]{width:20px;height:20px;flex-shrink:0;margin-top:2px;accent-color:var(--gold);cursor:pointer}
.terms-row label{font-size:.78rem;color:var(--muted);line-height:1.6;cursor:pointer}
.terms-row a{color:var(--gold)}
.full-btn{width:100%;font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--gold);color:#000;padding:1rem;border:none;cursor:pointer;min-height:var(--touch);box-shadow:0 4px 20px var(--gold-glow);transition:background .3s;-webkit-appearance:none}
.full-btn:hover{background:var(--gold-lt)}
.full-btn:disabled{background:var(--muted);cursor:not-allowed;box-shadow:none}
.divider{display:flex;align-items:center;gap:.8rem;margin:.3rem 0}
.divider span{font-size:.68rem;color:var(--muted);font-family:'Rajdhani',sans-serif;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.auth-foot{text-align:center;font-size:.82rem;color:var(--muted);margin-top:.8rem}
.auth-foot a{color:var(--gold);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<nav id="navbar" style="justify-content:center;gap:0">
  <a href="index.html" class="nav-logo">
    <img src="Logo.jpeg" class="nav-logo-img" alt="AV Group"/>
    <span class="nav-logo-text"><span class="logo-av">AV GROUP</span><span class="logo-grp">SECURITY</span></span>
  </a>
</nav>

<div class="auth-wrap">
  <div class="auth-grid-bg" aria-hidden="true"></div>
  <div class="auth-box">
    <div class="auth-inner">
      <div class="auth-head">
        <div class="auth-logo">
          <img src="Logo.jpeg" alt="AV Group"/>
          <span class="auth-logo-txt">AV <span>GROUP</span></span>
        </div>
        <h1 class="auth-h1">Create Account</h1>
        <p class="auth-sub">Free registration to browse and book security services</p>
      </div>
      <div class="error-msg"  id="errMsg"><p id="errTxt"></p></div>
      <div class="success-msg" id="okMsg"><p id="okTxt"></p></div>
      <form class="auth-form" id="regForm" novalidate>
        <div class="grid2">
          <div class="fg"><label for="fname">First Name <span class="req">*</span></label><input type="text" id="fname" placeholder="First name" required autocomplete="given-name"/></div>
          <div class="fg"><label for="lname">Last Name <span class="req">*</span></label><input type="text" id="lname" placeholder="Last name" required autocomplete="family-name"/></div>
        </div>
        <div class="fg"><label for="phone">Phone Number <span class="req">*</span></label><input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required autocomplete="tel"/></div>
        <div class="fg"><label for="email">Email Address <span class="req">*</span></label><input type="email" id="email" placeholder="your@email.com" required autocomplete="email"/></div>
        <div class="grid2">
          <div class="fg"><label for="company">Company (Optional)</label><input type="text" id="company" placeholder="Your company" autocomplete="organization"/></div>
          <div class="fg"><label for="city">City <span class="req">*</span></label><input type="text" id="city" placeholder="e.g. Andheri, Mumbai" required autocomplete="address-level2"/></div>
        </div>
        <div class="fg">
          <label for="password">Password <span class="req">*</span> <span style="font-weight:300;color:var(--muted);letter-spacing:0;text-transform:none;font-size:.7rem">(min 6 characters)</span></label>
          <div class="pw-wrap"><input type="password" id="password" placeholder="Choose a password" required autocomplete="new-password" oninput="checkStr(this.value)"/>
          <button type="button" class="pw-eye" onclick="togglePw('password')" aria-label="Show">👁</button></div>
          <div class="pw-str"><div class="pw-str-bar" id="strBar"></div></div>
        </div>
        <div class="fg">
          <label for="confirm">Confirm Password <span class="req">*</span></label>
          <div class="pw-wrap"><input type="password" id="confirm" placeholder="Repeat password" required autocomplete="new-password"/>
          <button type="button" class="pw-eye" onclick="togglePw('confirm')" aria-label="Show">👁</button></div>
        </div>
        <div class="terms-row">
          <input type="checkbox" id="terms" required/>
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and confirm my information will be used to process bookings with AV Group.</label>
        </div>
        <button type="submit" class="full-btn" id="regBtn">Create My Account →</button>
      </form>
      <div class="divider"><span>already registered?</span></div>
      <div class="auth-foot"><a href="login.html">← Login to your account</a></div>
      <div class="auth-foot" style="margin-top:.4rem"><a href="index.html">← Back to Website</a></div>
    </div>
  </div>
</div>

<div class="credit-bar">
  <span>Designed &amp; Developed by</span>
  <a href="https://github.com/rajg39389-source" target="_blank" rel="noopener">⚡ Raj Gupta</a>
  <span>· Need a website? Contact me!</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const form   = document.getElementById('regForm');
const btn    = document.getElementById('regBtn');
const errMsg = document.getElementById('errMsg');
const errTxt = document.getElementById('errTxt');
const okMsg  = document.getElementById('okMsg');
const okTxt  = document.getElementById('okTxt');

function showErr(msg){ errTxt.textContent=msg; errMsg.classList.add('show'); okMsg.classList.remove('show'); window.scrollTo({top:0,behavior:'smooth'}); }
function showOk(msg) { okTxt.textContent=msg;  okMsg.classList.add('show'); errMsg.classList.remove('show'); }
function setBusy(on){ btn.disabled=on; btn.innerHTML=on?'<span class="spin"></span>Creating account...':'Create My Account →'; }

window.checkStr = function(pw) {
  const bar = document.getElementById('strBar');
  let s = 0;
  if(pw.length>=6) s++; if(pw.length>=10) s++; if(/[A-Z]/.test(pw)) s++; if(/[0-9]/.test(pw)) s++; if(/[^A-Za-z0-9]/.test(pw)) s++;
  bar.style.width=(s*20)+'%'; bar.style.background=['#e63946','#f59e0b','#f59e0b','#22c55e','#22c55e'][s-1]||'var(--border2)';
};
window.togglePw = function(id){ const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; };

form.addEventListener('submit', async e => {
  e.preventDefault();
  const fname=document.getElementById('fname').value.trim();
  const lname=document.getElementById('lname').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const email=document.getElementById('email').value.trim();
  const company=document.getElementById('company').value.trim();
  const city=document.getElementById('city').value.trim();
  const pw=document.getElementById('password').value;
  const pw2=document.getElementById('confirm').value;
  const terms=document.getElementById('terms').checked;
  if(!fname||!lname||!phone||!email||!city){ showErr('Please fill all required fields.'); return; }
  if(pw.length<6){ showErr('Password must be at least 6 characters.'); return; }
  if(pw!==pw2){ showErr('Passwords do not match.'); return; }
  if(!terms){ showErr('Please accept the Terms of Service.'); return; }
  setBusy(true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await updateProfile(cred.user, { displayName: fname+' '+lname });
    await setDoc(doc(db,'users',cred.user.uid), {
      uid:cred.user.uid, firstName:fname, lastName:lname, fullName:fname+' '+lname,
      phone, email, company:company||'', city, role:'user', totalBookings:0,
      createdAt:serverTimestamp()
    });
    showOk('Account created! Redirecting to your dashboard...');
    setTimeout(()=>window.location.href='dashboard.html', 1500);
  } catch(err) {
    const msgs={'auth/email-already-in-use':'An account with this email already exists. Please login.','auth/invalid-email':'Invalid email address.','auth/weak-password':'Password is too weak.'};
    showErr(msgs[err.code]||'Registration failed. Please try again.');
    setBusy(false);
  }
});

onAuthStateChanged(auth, u => { if(u) window.location.href='dashboard.html'; });
</script>
</body>
</html>
