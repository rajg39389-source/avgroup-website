<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=5.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060d1a"/>
<meta name="format-detection" content="telephone=no"/>
<title>Login – AV Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&family=Oswald:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.auth-wrap{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:max(5rem,env(safe-area-inset-top,0px)) max(1rem,16px) max(2rem,env(safe-area-inset-bottom,0px));background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(224,155,26,.07),transparent 60%),var(--navy);position:relative}
.auth-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(224,155,26,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(224,155,26,.025) 1px,transparent 1px);background-size:55px 55px}
.auth-box{width:100%;max-width:430px;position:relative;z-index:2}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-lt),transparent)}
.auth-inner{background:var(--card);border:1px solid var(--border);border-top:none;padding:clamp(1.8rem,5vw,3rem)}
.auth-head{text-align:center;margin-bottom:2rem}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:.7rem;margin-bottom:1.2rem}
.auth-logo img{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold);object-fit:cover}
.auth-logo-txt{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--white)}
.auth-logo-txt span{color:var(--gold)}
.auth-h1{font-family:'Oswald',sans-serif;font-size:1.7rem;font-weight:700;color:var(--white);margin-bottom:.25rem}
.auth-sub{font-size:.82rem;font-weight:300;color:var(--muted)}
.auth-form{display:flex;flex-direction:column;gap:.9rem}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:3rem}
.pw-eye{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.3rem;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.pw-eye:hover{color:var(--gold)}
.auth-foot{text-align:center;font-size:.82rem;color:var(--muted);margin-top:.8rem}
.auth-foot a{color:var(--gold);text-decoration:none;font-weight:500}
.auth-foot a:hover{text-decoration:underline}
.forgot{text-align:right;margin-top:-.4rem}
.forgot a{font-size:.74rem;color:var(--muted);text-decoration:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px;font-weight:600}
.forgot a:hover{color:var(--gold)}
.divider{display:flex;align-items:center;gap:.8rem;margin:.3rem 0}
.divider span{font-size:.68rem;color:var(--muted);font-family:'Rajdhani',sans-serif;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.full-btn{width:100%;font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--gold);color:#000;padding:1rem;border:none;cursor:pointer;min-height:var(--touch);box-shadow:0 4px 20px var(--gold-glow);transition:background .3s;-webkit-appearance:none}
.full-btn:hover{background:var(--gold-lt)}
.full-btn:disabled{background:var(--muted);cursor:not-allowed;box-shadow:none}
.pw-str{height:3px;background:var(--border2);border-radius:2px;margin-top:.3rem;overflow:hidden}
.pw-str-bar{height:100%;width:0;transition:width .3s,background .3s}
</style>
</head>
<body>
<nav id="navbar" style="justify-content:center;gap:0">
  <a href="index.html" class="nav-logo">
    <img src="Logo.jpeg" class="nav-logo-img" alt="AV Group"/>
    <span class="nav-logo-text"><span class="logo-av">AV GROUP</span><span class="logo-grp">SECURITY</span></span>
  </a>
</nav>

<div class="auth-wrap">
  <div class="auth-grid-bg" aria-hidden="true"></div>
  <div class="auth-box">
    <div class="auth-inner">
      <div class="auth-head">
        <div class="auth-logo">
          <img src="Logo.jpeg" alt="AV Group"/>
          <span class="auth-logo-txt">AV <span>GROUP</span></span>
        </div>
        <h1 class="auth-h1">Welcome Back</h1>
        <p class="auth-sub">Login to access your account and manage bookings</p>
      </div>
      <div class="error-msg" id="errMsg"><p id="errTxt"></p></div>
      <div class="success-msg" id="okMsg"><p id="okTxt"></p></div>
      <form class="auth-form" id="loginForm" novalidate>
        <div class="fg">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" required autocomplete="email"/>
        </div>
        <div class="fg">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Your password" required autocomplete="current-password"/>
            <button type="button" class="pw-eye" onclick="togglePw('password','this')" id="eyeBtn1" aria-label="Show password">👁</button>
          </div>
        </div>
        <div class="forgot"><a href="#" onclick="doForgot();return false">Forgot Password?</a></div>
        <button type="submit" class="full-btn" id="loginBtn">Login to Account →</button>
      </form>
      <div class="divider"><span>or</span></div>
      <div class="auth-foot">Don't have an account? <a href="register.html">Register Free →</a></div>
      <div class="auth-foot" style="margin-top:.4rem"><a href="index.html">← Back to Website</a></div>
    </div>
  </div>
</div>

<div class="credit-bar">
  <span>Designed &amp; Developed by</span>
  <a href="https://github.com/rajg39389-source" target="_blank" rel="noopener">⚡ Raj Gupta</a>
  <span>· Need a website? Contact me!</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

const form    = document.getElementById('loginForm');
const btn     = document.getElementById('loginBtn');
const errMsg  = document.getElementById('errMsg');
const errTxt  = document.getElementById('errTxt');
const okMsg   = document.getElementById('okMsg');
const okTxt   = document.getElementById('okTxt');

function showErr(msg){ errTxt.textContent=msg; errMsg.classList.add('show'); okMsg.classList.remove('show'); }
function showOk(msg) { okTxt.textContent=msg;  okMsg.classList.add('show'); errMsg.classList.remove('show'); }
function setBusy(on){ btn.disabled=on; btn.innerHTML=on?'<span class="spin"></span>Logging in...':'Login to Account →'; }

const ERR = {
  'auth/user-not-found':    'No account with this email.',
  'auth/wrong-password':    'Wrong password. Try again.',
  'auth/invalid-credential':'Invalid email or password.',
  'auth/invalid-email':     'Please enter a valid email.',
  'auth/too-many-requests': 'Too many attempts. Try again later.',
  'auth/network-request-failed':'Network error. Check your connection.'
};

form.addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  if(!email || !pass){ showErr('Please fill in all fields.'); return; }
  setBusy(true);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    showOk('Login successful! Redirecting...');
    setTimeout(() => window.location.href = email===ADMIN_EMAIL ? 'admin.html' : 'dashboard.html', 900);
  } catch(err) {
    showErr(ERR[err.code] || 'Login failed. Please try again.');
    setBusy(false);
  }
});

window.doForgot = async function() {
  const email = document.getElementById('email').value.trim();
  if(!email){ showErr('Enter your email address first, then click Forgot Password.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showOk('Password reset email sent! Check your inbox.');
  } catch(e){ showErr('Could not send reset email. Check the address.'); }
};

window.togglePw = function(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
};

onAuthStateChanged(auth, u => {
  if(u) window.location.href = u.email===ADMIN_EMAIL ? 'admin.html' : 'dashboard.html';
});
</script>
</body>
</html>
