<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=5.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#060d1a"/>
<meta name="format-detection" content="telephone=no"/>
<title>Mark Attendance – AV Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&family=Oswald:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.att-page{min-height:100svh;padding:calc(80px + env(safe-area-inset-top,0px)) max(5vw,16px) calc(2rem + env(safe-area-inset-bottom,0px));background:var(--navy)}
.att-wrap{max-width:480px;margin:0 auto}

/* Status card */
.att-status-card{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--gold);padding:1.8rem;text-align:center;margin-bottom:1.2rem;position:relative;overflow:hidden}
.att-status-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(224,155,26,.05),transparent 60%)}
.att-sc-icon{font-size:2.8rem;margin-bottom:.6rem;position:relative}
.att-sc-name{font-family:'Oswald',sans-serif;font-size:1.35rem;font-weight:700;color:var(--white);margin-bottom:.15rem;position:relative}
.att-sc-email{font-size:.78rem;color:var(--muted);position:relative}

/* Status badge */
.att-curr{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.9rem;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.2rem}
.att-curr.in {background:rgba(34,197,94,.1); color:var(--green);border:1px solid rgba(34,197,94,.3)}
.att-curr.out{background:rgba(230,57,70,.1); color:var(--red);  border:1px solid rgba(230,57,70,.3)}
.att-curr.off{background:var(--card);         color:var(--muted);border:1px solid var(--border2)}
.att-curr-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.att-curr.in .att-curr-dot{animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Info grid */
.att-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.2rem}
.att-info-box{background:var(--card);border:1px solid var(--border2);padding:1rem;text-align:center}
.att-info-val{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold);display:block;line-height:1;margin-bottom:.2rem}
.att-info-lbl{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

/* Location */
.att-loc{background:var(--card);border:1px solid var(--border);padding:1rem 1.2rem;margin-bottom:1.1rem;display:flex;align-items:flex-start;gap:.8rem}
.att-loc-icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.att-loc-body{flex:1;min-width:0}
.att-loc-lbl{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.2rem}
.att-loc-addr{font-size:.82rem;color:var(--steel);line-height:1.5;word-break:break-all}
.att-loc-coords{font-size:.7rem;color:var(--muted);margin-top:.2rem}
.att-map-link{font-size:.68rem;color:#60a5fa;text-decoration:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px;font-weight:600;margin-top:.3rem;display:inline-block}

/* Note */
.att-note-wrap{margin-bottom:1.1rem}
.att-note-wrap label{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.35rem}
.att-note-wrap input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--steel);padding:.75rem 1rem;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;border-radius:0;-webkit-appearance:none;transition:border-color .3s;min-height:var(--touch)}
.att-note-wrap input:focus{border-color:var(--gold)}
.att-note-wrap input::placeholder{color:var(--muted)}

/* Alert */
.att-alert{padding:.85rem 1rem;font-size:.83rem;line-height:1.6;margin-bottom:1rem;display:none}
.att-alert.show{display:block}
.att-alert.info   {background:var(--gold-dim);border:1px solid var(--border);color:var(--gold)}
.att-alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.att-alert.error  {background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:var(--red)}

/* Buttons */
.btn-checkin{width:100%;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:var(--green);color:#000;padding:1.1rem;border:none;cursor:pointer;min-height:56px;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:opacity .3s;-webkit-appearance:none;box-shadow:0 4px 20px rgba(34,197,94,.35)}
.btn-checkin:hover{opacity:.9}
.btn-checkin:disabled{background:var(--muted);box-shadow:none;cursor:not-allowed;opacity:1}
.btn-checkout{width:100%;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:var(--red);color:#fff;padding:1.1rem;border:none;cursor:pointer;min-height:56px;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:opacity .3s;-webkit-appearance:none;box-shadow:0 4px 20px rgba(230,57,70,.35)}
.btn-checkout:hover{opacity:.9}
.btn-checkout:disabled{background:var(--muted);box-shadow:none;cursor:not-allowed;opacity:1}

/* History */
.hist-head{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:1.8rem 0 .8rem;display:flex;align-items:center;gap:.5rem}
.hist-head::before{content:'';display:block;width:18px;height:2px;background:var(--gold)}
.hist-item{background:var(--card);border:1px solid var(--border2);padding:.9rem 1rem;margin-bottom:.5rem;display:flex;align-items:flex-start;gap:.8rem}
.hist-badge{flex-shrink:0;min-width:72px}
.hist-info{flex:1;min-width:0}
.hist-time{font-size:.82rem;color:var(--white);font-weight:500}
.hist-loc{font-size:.74rem;color:var(--muted);margin-top:.15rem;word-break:break-all}
.hist-map{font-size:.68rem;color:#60a5fa;text-decoration:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px;font-weight:600}
.back-link{display:block;text-align:center;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:.5rem;margin-top:1.5rem;min-height:40px;display:flex;align-items:center;justify-content:center}
.back-link:hover{color:var(--gold)}
</style>
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="Logo.jpeg" class="nav-logo-img" alt="AV Group"/>
    <span class="nav-logo-text"><span class="logo-av">AV GROUP</span><span class="logo-grp">SECURITY</span></span>
  </a>
  <div style="flex:1"></div>
  <div class="nav-right">
    <span id="navName" style="font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:1px;color:var(--muted)"></span>
    <button onclick="doLogout()" class="nav-cta" style="border:none;cursor:pointer">Logout</button>
  </div>
</nav>

<div class="att-page">
  <div class="att-wrap">

    <!-- Status card -->
    <div class="att-status-card">
      <div class="att-sc-icon" id="scIcon">📋</div>
      <div class="att-sc-name" id="scName">Loading...</div>
      <div class="att-sc-email" id="scEmail"></div>
    </div>

    <!-- Current status -->
    <div class="att-curr off" id="currStatus">
      <span class="att-curr-dot"></span>
      <span id="currText">Not Checked In</span>
    </div>

    <!-- Info grid -->
    <div class="att-info-grid">
      <div class="att-info-box"><span class="att-info-val" id="infoDate">--</span><span class="att-info-lbl">Today</span></div>
      <div class="att-info-box"><span class="att-info-val" id="infoTime">--:--</span><span class="att-info-lbl">Current Time</span></div>
      <div class="att-info-box"><span class="att-info-val" id="infoCheckin">--</span><span class="att-info-lbl">Checked In At</span></div>
      <div class="att-info-box"><span class="att-info-val" id="infoHours">--</span><span class="att-info-lbl">Hours Today</span></div>
    </div>

    <!-- Location display -->
    <div class="att-loc" id="locBox">
      <span class="att-loc-icon">📍</span>
      <div class="att-loc-body">
        <span class="att-loc-lbl">Your Location</span>
        <span class="att-loc-addr" id="locAddr">Tap Check In to capture location</span>
        <span class="att-loc-coords" id="locCoords"></span>
        <div id="locMapLink"></div>
      </div>
    </div>

    <!-- Note field -->
    <div class="att-note-wrap">
      <label>Site Name / Note (Optional)</label>
      <input type="text" id="attNote" placeholder="e.g. ABC Office, Andheri East"/>
    </div>

    <!-- Alert -->
    <div class="att-alert" id="attAlert"></div>

    <!-- Buttons -->
    <button class="btn-checkin" id="btnIn" onclick="markAtt('in')">✅ CHECK IN — Start Shift</button>
    <div style="height:.6rem"></div>
    <button class="btn-checkout" id="btnOut" onclick="markAtt('out')" style="display:none">🔴 CHECK OUT — End Shift</button>

    <!-- Today's log -->
    <div class="hist-head">Today's Log</div>
    <div id="histList"><div class="no-data" style="padding:1rem;font-size:.8rem">No records yet today.</div></div>

    <a href="index.html" class="back-link">← Back to Website</a>
  </div>
</div>

<div class="credit-bar">
  <span>Designed &amp; Developed by</span>
  <a href="https://github.com/rajg39389-source" target="_blank" rel="noopener">⚡ Raj Gupta</a>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, doc, getDoc }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
let currentUser=null, userProfile=null, checkinTime=null;

onAuthStateChanged(auth, async user=>{
  if(!user){ window.location.href='login.html'; return; }
  currentUser=user;
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists()) userProfile=snap.data();
  }catch(e){}
  document.getElementById('navName').textContent=userProfile?.fullName||user.email;
  document.getElementById('scName').textContent=userProfile?.fullName||user.displayName||'Serviceman';
  document.getElementById('scEmail').textContent=user.email;
  startClock();
  await loadTodayRecords();
});

function startClock(){
  function tick(){
    const now=new Date();
    document.getElementById('infoTime').textContent=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
    document.getElementById('infoDate').textContent=now.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    if(checkinTime){
      const ms=now-checkinTime;
      const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
      document.getElementById('infoHours').textContent=h+'h '+m+'m';
    }
  }
  tick(); setInterval(tick,30000);
}

function getGPS(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){ reject(new Error('GPS not supported on this device.')); return; }
    navigator.geolocation.getCurrentPosition(
      pos=>resolve(pos.coords),
      err=>{ const m={1:'Location permission denied. Please allow location in browser settings.',2:'Could not get location. Check GPS/internet.',3:'Location timed out. Try again.'}; reject(new Error(m[err.code]||'Location error')); },
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  });
}

async function getAddress(lat,lng){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=en`);
    const d=await r.json();
    const a=d.address||{};
    return [a.road||a.neighbourhood||a.suburb, a.suburb||a.city_district, a.city||a.town||a.county, a.state].filter(Boolean).slice(0,3).join(', ')||`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  }catch(e){ return `${lat.toFixed(5)}, ${lng.toFixed(5)}`; }
}

window.markAtt = async function(type){
  const btnIn=document.getElementById('btnIn');
  const btnOut=document.getElementById('btnOut');
  const alert=document.getElementById('attAlert');
  const note=document.getElementById('attNote').value.trim();
  const btn=type==='in'?btnIn:btnOut;

  alert.className='att-alert info show';
  alert.innerHTML='<span class="spin spin-w"></span> Getting your GPS location...';
  btn.disabled=true;

  try{
    const coords=await getGPS();
    const lat=coords.latitude, lng=coords.longitude;
    alert.innerHTML='<span class="spin spin-w"></span> Got location! Saving attendance...';
    const address=await getAddress(lat,lng);

    // Update location display
    document.getElementById('locAddr').textContent=address||'Location captured';
    document.getElementById('locCoords').textContent=`GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    document.getElementById('locMapLink').innerHTML=`<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" rel="noopener" class="att-map-link">🗺 Open in Google Maps</a>`;

    const now=new Date();
    const todayStr=now.toISOString().split('T')[0];

    await addDoc(collection(db,'attendance'),{
      userId:     currentUser.uid,
      userName:   userProfile?.fullName||currentUser.displayName||currentUser.email,
      userEmail:  currentUser.email,
      userPhone:  userProfile?.phone||'',
      type,
      timestamp:  now.toISOString(),
      date:       todayStr,
      latitude:   lat,
      longitude:  lng,
      address:    address||'',
      note:       note||'',
      createdAt:  serverTimestamp()
    });

    const timeStr=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});

    if(type==='in'){
      checkinTime=now;
      document.getElementById('infoCheckin').textContent=timeStr;
      document.getElementById('scIcon').textContent='✅';
      document.getElementById('currStatus').className='att-curr in';
      document.getElementById('currText').textContent='✅ Shift Active — Checked In at '+timeStr;
      btnIn.style.display='none'; btnOut.style.display='flex'; btnOut.disabled=false;
      alert.className='att-alert success show';
      alert.innerHTML=`✅ <strong>Checked In!</strong><br>📍 ${address}<br>🕐 ${timeStr}`;
    } else {
      checkinTime=null;
      document.getElementById('scIcon').textContent='🔴';
      document.getElementById('currStatus').className='att-curr out';
      document.getElementById('currText').textContent='🔴 Shift Ended — Checked Out at '+timeStr;
      btnOut.style.display='none'; btnIn.style.display='flex'; btnIn.disabled=false;
      btnIn.textContent='✅ CHECK IN — New Shift';
      alert.className='att-alert success show';
      alert.innerHTML=`✅ <strong>Checked Out!</strong><br>📍 ${address}<br>🕐 ${timeStr}`;
    }

    document.getElementById('attNote').value='';
    await loadTodayRecords();

  }catch(err){
    alert.className='att-alert error show';
    alert.innerHTML='❌ '+err.message;
    btn.disabled=false;
  }
};

async function loadTodayRecords(){
  if(!currentUser) return;
  const today=new Date().toISOString().split('T')[0];
  try{
    const q=query(collection(db,'attendance'),where('userId','==',currentUser.uid),where('date','==',today));
    const snap=await getDocs(q);
    let recs=snap.docs.map(d=>({id:d.id,...d.data()}));
    recs.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    const hist=document.getElementById('histList');
    if(!recs.length){ hist.innerHTML='<div class="no-data" style="padding:1rem;font-size:.8rem">No attendance records today yet.</div>'; return; }

    // Check if last record is check-in (no checkout yet)
    const lastRec=recs[0];
    if(lastRec.type==='in' && document.getElementById('btnOut').style.display==='none'){
      checkinTime=new Date(lastRec.timestamp);
      document.getElementById('infoCheckin').textContent=new Date(lastRec.timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      document.getElementById('scIcon').textContent='✅';
      document.getElementById('currStatus').className='att-curr in';
      document.getElementById('currText').textContent='✅ Shift Active';
      document.getElementById('btnIn').style.display='none';
      document.getElementById('btnOut').style.display='flex';
      document.getElementById('btnOut').disabled=false;
    }

    hist.innerHTML=recs.map(r=>`
      <div class="hist-item">
        <div class="hist-badge"><span class="badge ${r.type==='in'?'badge-in':'badge-out'}">${r.type==='in'?'IN':'OUT'}</span></div>
        <div class="hist-info">
          <div class="hist-time">🕐 ${new Date(r.timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}</div>
          <div class="hist-loc">📍 ${r.address||'Location captured'}${r.note?' · '+r.note:''}</div>
          ${r.latitude?`<a href="https://www.google.com/maps?q=${r.latitude},${r.longitude}" target="_blank" rel="noopener" class="hist-map">🗺 View on Maps</a>`:''}
        </div>
      </div>`).join('');
  }catch(e){ console.error('History error:',e); }
}

window.doLogout = async()=>{ try{await signOut(auth);}catch(e){} window.location.href='index.html'; };
</script>
</body>
</html>
