<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=5.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#060d1a"/>

<title>Mark Attendance – AV Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&family=Oswald:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
body { background: var(--navy); }

.att-page {
  min-height: 100svh;
  padding: calc(80px + var(--sat)) max(5vw,16px) calc(2rem + var(--sab));
  max-width: 500px; margin: 0 auto;
}

/* Status card */
.status-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  padding: 1.5rem;
  margin-bottom: 1.2rem;
  text-align: center;
}
.status-icon { font-size: 3rem; margin-bottom: .6rem; display: block; }
.status-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.4rem; font-weight: 700;
  color: var(--white); margin-bottom: .3rem;
}
.status-sub { font-size: .84rem; color: var(--muted); font-weight: 300; }

/* Big check in button */
.btn-checkin {
  width: 100%;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  background: var(--green); color: #000;
  padding: 1.3rem; border: none;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  gap: .6rem; min-height: 60px;
  transition: opacity .3s;
  -webkit-appearance: none;
  box-shadow: 0 4px 20px rgba(34,197,94,.35);
}
.btn-checkin:hover { opacity: .9; }
.btn-checkin:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; }

.btn-checkout {
  width: 100%;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  background: var(--red); color: #fff;
  padding: 1.3rem; border: none;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  gap: .6rem; min-height: 60px;
  transition: opacity .3s;
  -webkit-appearance: none;
  box-shadow: 0 4px 20px rgba(230,57,70,.35);
}
.btn-checkout:hover { opacity: .9; }
.btn-checkout:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; }

/* Current status badge */
.curr-status {
  display: flex; align-items: center; justify-content: center;
  gap: .6rem; padding: 1rem;
  font-family: 'Rajdhani', sans-serif;
  font-size: .85rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 1.2rem;
}
.curr-status.in  { background: rgba(34,197,94,.1);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.curr-status.out { background: rgba(230,57,70,.1);  color: var(--red);   border: 1px solid rgba(230,57,70,.3); }
.curr-status.off { background: var(--card); color: var(--muted); border: 1px solid var(--border2); }
.curr-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: blink 1.5s infinite; }
.curr-status.off .curr-dot { animation: none; }

/* Info rows */
.info-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: .8rem; margin-bottom: 1.2rem;
}
.info-box {
  background: var(--card); border: 1px solid var(--border2);
  padding: 1rem; text-align: center;
}
.info-box .ib-val {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem; font-weight: 600;
  color: var(--gold); display: block; margin-bottom: .2rem;
}
.info-box .ib-lbl {
  font-family: 'Rajdhani', sans-serif;
  font-size: .68rem; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}

/* Location box */
.loc-box {
  background: var(--card); border: 1px solid var(--border);
  padding: 1rem 1.2rem; margin-bottom: 1.2rem;
  display: flex; align-items: flex-start; gap: .8rem;
}
.loc-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 2px; }
.loc-text { flex: 1; min-width: 0; }
.loc-text .lt-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: .68rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); display: block; margin-bottom: .2rem;
}
.loc-text .lt-addr { font-size: .82rem; color: var(--steel); line-height: 1.5; word-break: break-all; }
.loc-text .lt-coords { font-size: .72rem; color: var(--muted); margin-top: .2rem; }
.btn-maps {
  font-family: 'Rajdhani', sans-serif;
  font-size: .68rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--blue-lt); text-decoration: none;
  border: 1px solid var(--border); padding: .25rem .6rem;
  display: inline-block; margin-top: .4rem;
  min-height: 30px; line-height: 1.8;
}

/* History */
.hist-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: .7rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: .8rem;
  display: flex; align-items: center; gap: .6rem;
}
.hist-title::before { content: ''; display: block; width: 20px; height: 2px; background: var(--gold); }
.hist-item {
  background: var(--card); border: 1px solid var(--border2);
  padding: .9rem 1rem; margin-bottom: .5rem;
  display: flex; align-items: flex-start; gap: .8rem;
}
.hist-type {
  font-family: 'Rajdhani', sans-serif;
  font-size: .65rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: .2rem .6rem; flex-shrink: 0;
}
.hist-type.in  { background: rgba(34,197,94,.1);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.hist-type.out { background: rgba(230,57,70,.1);  color: var(--red);   border: 1px solid rgba(230,57,70,.3); }
.hist-info { flex: 1; min-width: 0; }
.hist-info .hi-time { font-size: .82rem; color: var(--white); font-weight: 500; }
.hist-info .hi-loc  { font-size: .76rem; color: var(--muted); margin-top: .1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Alert / message */
.att-alert {
  padding: .9rem 1rem; font-size: .84rem; line-height: 1.6;
  margin-bottom: 1rem; display: none;
}
.att-alert.show { display: block; }
.att-alert.success { background: rgba(34,197,94,.1);  border: 1px solid rgba(34,197,94,.3);  color: var(--green); }
.att-alert.error   { background: rgba(230,57,70,.1);  border: 1px solid rgba(230,57,70,.3);  color: var(--red); }
.att-alert.info    { background: var(--gold-dim);      border: 1px solid var(--border);        color: var(--gold); }

.spinner-sm { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Note field */
.note-wrap { margin-bottom: 1.2rem; }
.note-wrap label {
  font-family: 'Rajdhani', sans-serif;
  font-size: .68rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); display: block; margin-bottom: .4rem;
}
.note-wrap input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  color: var(--steel); padding: .75rem 1rem;
  font-size: 16px; font-family: 'DM Sans', sans-serif;
  outline: none; border-radius: 0; -webkit-appearance: none;
  transition: border-color .3s;
}
.note-wrap input:focus { border-color: var(--gold); }
.note-wrap input::placeholder { color: var(--muted); }

.no-items-small { text-align: center; padding: 1.5rem; color: var(--muted); font-size: .82rem; }
</style>
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="Logo.jpeg" class="nav-logo-img" alt="AV Group"/>
    <span class="nav-logo-text"><span class="logo-av">AV GROUP</span><span class="logo-grp">SECURITY</span></span>
  </a>
  <div style="flex:1"></div>
  <div class="nav-right">
    <span id="navName" style="font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:1px"></span>
    <button onclick="doLogout()" class="nav-cta" style="border:none;cursor:pointer">Logout</button>
  </div>
</nav>

<div class="att-page">

  <!-- Status card -->
  <div class="status-card">
    <span class="status-icon" id="statusIcon">📋</span>
    <div class="status-title" id="statusTitle">Loading...</div>
    <div class="status-sub" id="statusSub">Please wait</div>
  </div>

  <!-- Current shift status -->
  <div class="curr-status off" id="currStatus">
    <span class="curr-dot"></span>
    <span id="currStatusText">Not Checked In</span>
  </div>

  <!-- Today info -->
  <div class="info-grid">
    <div class="info-box">
      <span class="ib-val" id="todayDate">--</span>
      <span class="ib-lbl">Today</span>
    </div>
    <div class="info-box">
      <span class="ib-val" id="currentTime">--:--</span>
      <span class="ib-lbl">Current Time</span>
    </div>
    <div class="info-box">
      <span class="ib-val" id="checkInTime">--</span>
      <span class="ib-lbl">Checked In At</span>
    </div>
    <div class="info-box">
      <span class="ib-val" id="hoursWorked">--</span>
      <span class="ib-lbl">Hours Today</span>
    </div>
  </div>

  <!-- Location -->
  <div class="loc-box" id="locBox">
    <span class="loc-icon">📍</span>
    <div class="loc-text">
      <span class="lt-label">Your Location</span>
      <span class="lt-addr" id="locAddr">Tap Check In to capture location</span>
      <span class="lt-coords" id="locCoords"></span>
    </div>
  </div>

  <!-- Note -->
  <div class="note-wrap">
    <label>Site Name / Note (optional)</label>
    <input type="text" id="attNote" placeholder="e.g. ABC Office, Andheri East"/>
  </div>

  <!-- Alert -->
  <div class="att-alert" id="attAlert"></div>

  <!-- Buttons -->
  <button class="btn-checkin" id="btnCheckin" onclick="markAttendance('in')">
    ✅ CHECK IN — Start Shift
  </button>
  <div style="height:.6rem"></div>
  <button class="btn-checkout" id="btnCheckout" onclick="markAttendance('out')" style="display:none">
    🔴 CHECK OUT — End Shift
  </button>

  <div style="height:2rem"></div>

  <!-- History -->
  <div class="hist-title">Today's Attendance Log</div>
  <div id="histList"><div class="no-items-small">No records yet today.</div></div>

  <div style="height:1.5rem"></div>
  <a href="index.html" style="display:block;text-align:center;font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:.5rem">← Back to Website</a>

</div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where,
         getDocs, serverTimestamp, orderBy }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig }   from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
let currentUser = null, userProfile = null;
let checkedInRecord = null;

/* ── Auth Guard ── */
onAuthStateChanged(auth, async user => {
  if(!user){ window.location.href = 'login.html'; return; }
  currentUser = user;
  document.getElementById('navName').textContent = user.displayName || user.email;
  // Load user profile
  try {
    const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getDoc(doc(db,'users',user.uid));
    if(snap.exists()) userProfile = snap.data();
  } catch(e){}
  updateStatusCard();
  startClock();
  loadTodayRecords();
});

/* ── Clock ── */
function startClock(){
  function tick(){
    const now = new Date();
    document.getElementById('currentTime').textContent =
      now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
    document.getElementById('todayDate').textContent =
      now.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    // Update hours worked
    if(checkedInRecord){
      const ms = now - new Date(checkedInRecord.timestamp);
      const hrs = Math.floor(ms/3600000);
      const mins = Math.floor((ms%3600000)/60000);
      document.getElementById('hoursWorked').textContent = hrs+'h '+mins+'m';
    }
  }
  tick();
  setInterval(tick, 30000);
}

/* ── Update UI ── */
function updateStatusCard(){
  const name = userProfile?.fullName || currentUser?.displayName || 'Serviceman';
  document.getElementById('statusTitle').textContent = name;
  document.getElementById('statusSub').textContent   = userProfile?.city || currentUser?.email || '';
}

/* ── Get GPS Location ── */
function getLocation(){
  return new Promise((resolve, reject) => {
    if(!navigator.geolocation){
      reject(new Error('GPS not supported on this device'));
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => resolve(pos.coords),
      err => {
        const msgs = {
          1: 'Location permission denied. Please allow location access in your browser settings.',
          2: 'Could not get location. Please check your GPS/internet.',
          3: 'Location request timed out. Try again.'
        };
        reject(new Error(msgs[err.code] || 'Location error'));
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

/* ── Reverse geocode ── */
async function getAddress(lat, lng){
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
    const data = await res.json();
    const d = data.address || {};
    return [d.road||d.suburb||d.neighbourhood, d.suburb||d.city_district, d.city||d.town, d.state]
      .filter(Boolean).slice(0,3).join(', ');
  } catch(e){
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }
}

/* ── Mark Attendance ── */
window.markAttendance = async function(type){
  const btnIn  = document.getElementById('btnCheckin');
  const btnOut = document.getElementById('btnCheckout');
  const alert  = document.getElementById('attAlert');
  const note   = document.getElementById('attNote').value.trim();
  const btn    = type==='in' ? btnIn : btnOut;

  alert.className = 'att-alert info show';
  alert.innerHTML = '<span class="spinner-sm"></span> Getting your GPS location... please wait';
  btn.disabled = true;

  try {
    // Get GPS
    const coords = await getLocation();
    const lat = coords.latitude;
    const lng = coords.longitude;

    alert.innerHTML = '<span class="spinner-sm"></span> Got location! Saving attendance...';

    // Get address
    const address = await getAddress(lat, lng);

    // Update location UI
    document.getElementById('locAddr').textContent   = address || 'Location captured';
    document.getElementById('locCoords').textContent = `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    document.getElementById('locBox').querySelector('.loc-text').innerHTML += `
      <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" rel="noopener" class="btn-maps">🗺️ Open in Google Maps</a>`;

    const now = new Date();
    const todayStr = now.toISOString().split('T')[0];

    // Save to Firebase
    await addDoc(collection(db,'attendance'),{
      userId:      currentUser.uid,
      userName:    userProfile?.fullName || currentUser.displayName || currentUser.email,
      userEmail:   currentUser.email,
      userPhone:   userProfile?.phone || '',
      type,           // 'in' or 'out'
      timestamp:   now.toISOString(),
      date:        todayStr,
      latitude:    lat,
      longitude:   lng,
      address,
      note:        note || '',
      createdAt:   serverTimestamp()
    });

    // Update UI
    if(type === 'in'){
      checkedInRecord = { timestamp: now.toISOString() };
      document.getElementById('checkInTime').textContent =
        now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      btnIn.style.display  = 'none';
      btnOut.style.display = 'flex';
      btnOut.disabled      = false;
      const cs = document.getElementById('currStatus');
      cs.className = 'curr-status in';
      document.getElementById('currStatusText').textContent = '✅ Shift Active — Checked In';
      document.getElementById('statusIcon').textContent = '✅';
      alert.className = 'att-alert success show';
      alert.innerHTML = `✅ <strong>Checked In Successfully!</strong><br>📍 ${address}<br>🕐 ${now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}`;
    } else {
      btnOut.style.display = 'none';
      btnIn.style.display  = 'flex';
      btnIn.textContent    = '✅ CHECK IN — New Shift';
      btnIn.disabled       = false;
      checkedInRecord      = null;
      const cs = document.getElementById('currStatus');
      cs.className = 'curr-status out';
      document.getElementById('currStatusText').textContent = '🔴 Shift Ended — Checked Out';
      document.getElementById('statusIcon').textContent = '🔴';
      alert.className = 'att-alert success show';
      alert.innerHTML = `✅ <strong>Checked Out Successfully!</strong><br>📍 ${address}<br>🕐 ${now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}`;
    }

    document.getElementById('attNote').value = '';
    loadTodayRecords();

  } catch(err){
    alert.className = 'att-alert error show';
    alert.innerHTML = '❌ ' + err.message;
    btn.disabled = false;
  }
};

/* ── Load Today Records ── */
async function loadTodayRecords(){
  if(!currentUser) return;
  try {
    const todayStr = new Date().toISOString().split('T')[0];
    const q = query(
      collection(db,'attendance'),
      where('userId','==',currentUser.uid),
      where('date','==',todayStr)
    );
    const snap = await getDocs(q);
    let recs = snap.docs.map(d=>({id:d.id,...d.data()}));
    recs.sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));

    const el = document.getElementById('histList');
    if(!recs.length){ el.innerHTML='<div class="no-items-small">No attendance records today yet.</div>'; return; }

    // Check if last record is check-in
    const lastRec = recs[0];
    if(lastRec.type === 'in'){
      checkedInRecord = { timestamp: lastRec.timestamp };
      document.getElementById('btnCheckin').style.display  = 'none';
      document.getElementById('btnCheckout').style.display = 'flex';
      document.getElementById('btnCheckout').disabled = false;
      document.getElementById('checkInTime').textContent =
        new Date(lastRec.timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      const cs = document.getElementById('currStatus');
      cs.className = 'curr-status in';
      document.getElementById('currStatusText').textContent = '✅ Shift Active — Checked In';
      document.getElementById('statusIcon').textContent = '✅';
    }

    el.innerHTML = recs.map(r=>`
      <div class="hist-item">
        <span class="hist-type ${r.type}">${r.type==='in'?'CHECK IN':'CHECK OUT'}</span>
        <div class="hist-info">
          <div class="hi-time">${new Date(r.timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})} — ${new Date(r.timestamp).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
          <div class="hi-loc">📍 ${r.address||'Location captured'}${r.note?' · '+r.note:''}</div>
          <a href="https://www.google.com/maps?q=${r.latitude},${r.longitude}" target="_blank" rel="noopener" style="font-size:.68rem;color:var(--blue-lt);text-decoration:none">🗺️ View on Maps</a>
        </div>
      </div>`).join('');
  } catch(e){ console.error(e); }
}

window.doLogout = async function(){
  await signOut(auth);
  window.location.href = 'index.html';
};
</script>
